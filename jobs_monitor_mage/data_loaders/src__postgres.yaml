version: 2

sources:
  - name: internal_postgres
    database: "{{ env_var('POSTGRES_DB') }}"
    schema: "{{ env_var('POSTGRES_SCHEMA', 'public') }}"
    tables:
      - name: "{{ env_var('POSTGRES_TABLE') }}" 
        description: "Raw job postings ingested via Mage from LinkedIn and InfoJobs."
        loaded_at_field: scraped_at # Helps with freshness checks
        
        # Add basic bouncer checks right at the source!
        columns:
          - name: link
            data_tests:
              - not_null
              - unique