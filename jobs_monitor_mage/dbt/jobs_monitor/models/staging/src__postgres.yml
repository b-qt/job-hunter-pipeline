version: 2

sources:
  - name: internal_postgres # This is the 'nickname' dbt uses
    database: "{{ env_var('POSTGRES_DB') }}"
    schema: "{{ env_var('POSTGRES_SCHEMA', 'public') }}"
    tables:
      - name: "{{ env_var('POSTGRES_TABLE') }}" # 🚀 The variable from your .env
        description: "Raw job postings ingested via Mage from LinkedIn and InfoJobs."
        loaded_at_field: scraped_at # Helps with freshness checks

        freshness:
          warn_after: {count: 12, period: hour} # Warn if data is older than 12 hours
          error_after: {count: 24, period: hour} # Error if data is older than 24 hours
        # Add basic bouncer checks right at the source!
        columns:
          - name: link
            data_tests:
              - not_null
              - unique